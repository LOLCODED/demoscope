<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      /* Palette + monospace type borrowed from the music-move app so the popup
         reads as the same product as the editor it opens. Dark is the signature
         look; the light block mirrors the editor's light theme for OS parity. */
      :root {
        --bg: #f4f4f5;
        --surface: #ffffff;
        --surface-2: #ededee;
        --border: #dcdce0;
        --text: #1a1a1a;
        --muted: #6b6b70;
        --dim: #9a9aa0;
        --accent: #8b5cf6;
        --accent-hover: #7c48f4;
        --accent-soft: #efeafe;
        --danger: #ef4444;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0a0a0a;
          --surface: #111111;
          --surface-2: #1a1a1a;
          --border: #2a2a2a;
          --text: #ededed;
          --muted: #888888;
          --dim: #555555;
          --accent: #8b5cf6;
          --accent-hover: #a78bfa;
          --accent-soft: #241b3d;
          --danger: #ef4444;
        }
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        width: 340px;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        font-size: 13px;
        line-height: 1.5;
        color: var(--text);
        background: var(--bg);
        padding: 16px;
        -webkit-font-smoothing: antialiased;
      }
      h1 {
        font-size: 15px;
        font-weight: 600;
        letter-spacing: -0.01em;
        margin-bottom: 12px;
      }

      .status {
        padding: 8px 12px;
        border: 1px solid var(--border);
        border-radius: 6px;
        margin-bottom: 12px;
        font-size: 12px;
        background: var(--surface);
      }
      .status.idle {
        color: var(--muted);
      }
      .status.recording {
        color: var(--danger);
        border-color: rgba(239, 68, 68, 0.4);
        background: rgba(239, 68, 68, 0.1);
      }
      .step-count {
        font-weight: 600;
        font-variant-numeric: tabular-nums;
      }
      .recording-dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        background: var(--danger);
        border-radius: 50%;
        margin-right: 6px;
        animation: pulse 1s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }

      input[type="text"] {
        width: 100%;
        font-family: inherit;
        font-size: 12px;
        color: var(--text);
        background: var(--surface-2);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 8px 10px;
        margin-bottom: 12px;
        outline: none;
        transition: border-color 0.15s ease;
      }
      input[type="text"]:focus {
        border-color: var(--accent);
      }
      input[type="text"]::placeholder {
        color: var(--dim);
      }

      button {
        width: 100%;
        font-family: inherit;
        font-size: 13px;
        font-weight: 500;
        padding: 9px 12px;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: var(--surface-2);
        color: var(--text);
        cursor: pointer;
        margin-bottom: 8px;
        transition:
          background 0.15s ease,
          border-color 0.15s ease,
          transform 0.1s ease;
      }
      button:hover {
        border-color: var(--dim);
        background: var(--surface);
      }
      button:active {
        transform: scale(0.98);
      }
      .btn-primary {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
      }
      .btn-primary:hover {
        background: var(--accent-hover);
        border-color: var(--accent-hover);
      }
      .btn-danger {
        background: var(--danger);
        border-color: var(--danger);
        color: #fff;
      }
      .btn-danger:hover {
        background: var(--danger);
        border-color: var(--danger);
        filter: brightness(1.08);
      }

      .hidden {
        display: none;
      }
      .info {
        font-size: 11px;
        color: var(--muted);
        text-align: center;
        margin-top: 4px;
      }
      .export-note {
        font-size: 11px;
        color: var(--accent);
        line-height: 1.5;
        margin-top: 8px;
        padding: 8px 10px;
        background: var(--accent-soft);
        border: 1px solid rgba(139, 92, 246, 0.3);
        border-radius: 6px;
      }
      .export-note code {
        font-family: "SFMono-Regular", "Menlo", "Consolas", monospace;
        background: var(--surface-2);
        color: var(--text);
        padding: 1px 4px;
        border-radius: 3px;
        font-size: 10px;
      }

      .saved-recordings {
        margin-top: 14px;
      }
      .saved-recordings hr {
        border: 0;
        border-top: 1px solid var(--border);
        margin: 12px 0;
      }
      .saved-heading {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 8px;
        color: var(--muted);
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .saved-list {
        display: grid;
        gap: 6px;
      }
      .saved-item {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 6px;
        margin: 0;
        padding: 7px 8px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 6px;
      }
      .saved-open {
        min-width: 0;
        width: auto;
        margin: 0;
        padding: 2px;
        text-align: left;
        color: var(--text);
        background: transparent;
        border: 0;
        font-weight: 500;
      }
      .saved-open:hover {
        background: transparent;
        border-color: transparent;
      }
      .saved-open strong,
      .saved-open span {
        display: block;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .saved-open strong {
        font-size: 12px;
      }
      .saved-open span {
        margin-top: 2px;
        color: var(--muted);
        font-size: 10px;
        font-weight: 400;
      }
      .saved-rename {
        width: auto;
        margin: 0;
        padding: 4px 8px;
        font-size: 11px;
        color: var(--muted);
        background: transparent;
      }
      .saved-rename:hover {
        color: var(--text);
        border-color: var(--dim);
        background: transparent;
      }
    </style>
  </head>
  <body>
    <h1>Demoscope</h1>

    <!-- Idle state -->
    <div id="idle-view">
      <div class="status idle">Ready to record</div>
      <input
        type="text"
        id="title-input"
        placeholder="Recording title (optional)"
        value=""
      />
      <button class="btn-primary" id="start-btn">Start Recording</button>
    </div>

    <!-- Recording state -->
    <div id="recording-view" class="hidden">
      <div class="status recording">
        <span class="recording-dot"></span>
        Recording — <span class="step-count" id="step-count">0</span> frames
        captured
      </div>
      <button class="btn-danger" id="stop-btn">Stop & Preview</button>
    </div>

    <p class="info">Captures screenshots + interactions as you browse</p>
    <section class="saved-recordings hidden" id="saved-recordings">
      <hr />
      <div class="saved-heading">Saved recordings</div>
      <div class="saved-list" id="saved-list"></div>
    </section>
    <div class="export-note hidden" id="export-note">
      Opening a preview tab where you can download MP4, GIF, or the
      <code>.zip</code> capture for the CLI.
    </div>

    <script src="popup.js"></script>
  </body>
</html>
