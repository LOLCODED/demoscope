<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Nimbus — Team analytics</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
      }
      body {
        font:
          15px/1.5 -apple-system,
          "Segoe UI",
          sans-serif;
        background: #f4f6fb;
        color: #1d2433;
      }
      header {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 14px 28px;
        background: #fff;
        border-bottom: 1px solid #e3e8f2;
      }
      .logo {
        width: 26px;
        height: 26px;
        border-radius: 7px;
        background: linear-gradient(135deg, #4f7cff, #9a5cff);
      }
      header strong {
        font-size: 16px;
      }
      header nav {
        margin-left: auto;
        display: flex;
        gap: 18px;
        color: #5b6474;
      }
      main {
        max-width: 900px;
        margin: 32px auto;
        padding: 0 24px;
      }
      h1 {
        font-size: 22px;
        margin-bottom: 6px;
      }
      .sub {
        color: #5b6474;
        margin-bottom: 24px;
      }
      .cards {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
        margin-bottom: 28px;
      }
      .card {
        background: #fff;
        border: 1px solid #e3e8f2;
        border-radius: 12px;
        padding: 18px;
      }
      .card .num {
        font-size: 26px;
        font-weight: 700;
      }
      .card .lbl {
        color: #5b6474;
        font-size: 13px;
      }
      .panel {
        background: #fff;
        border: 1px solid #e3e8f2;
        border-radius: 12px;
        padding: 22px;
      }
      .row {
        display: flex;
        gap: 10px;
        margin-top: 14px;
      }
      input[type="email"] {
        flex: 1;
        padding: 10px 12px;
        border: 1px solid #cdd6e6;
        border-radius: 8px;
        font-size: 15px;
      }
      button {
        padding: 10px 18px;
        border: 0;
        border-radius: 8px;
        background: #4f7cff;
        color: #fff;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
      }
      button.ghost {
        background: #eef2fb;
        color: #33415c;
      }
      .toast {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        background: #17b26a;
        color: #fff;
        padding: 10px 20px;
        border-radius: 999px;
        font-weight: 600;
        opacity: 0;
        transition: opacity 0.25s;
      }
      .toast.show {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="logo"></div>
      <strong>Nimbus</strong>
      <nav><span>Overview</span><span>Reports</span><span>Settings</span></nav>
    </header>
    <main>
      <h1>Team analytics</h1>
      <p class="sub">Weekly activity across your workspaces.</p>
      <div class="cards">
        <div class="card">
          <div class="num">1,284</div>
          <div class="lbl">Active sessions</div>
        </div>
        <div class="card">
          <div class="num">96.2%</div>
          <div class="lbl">Uptime</div>
        </div>
        <div class="card">
          <div class="num">47</div>
          <div class="lbl">New signups</div>
        </div>
      </div>
      <div class="panel">
        <strong>Invite a teammate</strong>
        <p class="sub" style="margin: 4px 0 0">
          They'll get access to every shared dashboard.
        </p>
        <div class="row">
          <input id="email" type="email" placeholder="teammate@company.com" />
          <button id="invite">Send invite</button>
          <button id="export" class="ghost">Export CSV</button>
        </div>
      </div>
    </main>
    <div id="toast" class="toast">Invite sent ✓</div>
    <script>
      const toast = document.getElementById("toast");
      document.getElementById("invite").addEventListener("click", () => {
        toast.textContent = "Invite sent ✓";
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 1600);
      });
      document.getElementById("export").addEventListener("click", () => {
        toast.textContent = "Export started…";
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 1600);
      });
    </script>
  </body>
</html>
