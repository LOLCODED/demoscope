meta:
  title: "Example: Search on Wikipedia"
  baseUrl: https://www.wikipedia.org
  viewport:
    width: 1280
    height: 720
  defaultWait: 800

steps:
  - id: step-1
    action: navigate
    url: https://www.wikipedia.org
    wait: 1500
    annotation: Open Wikipedia

  - id: step-2
    action: click
    selector: "#searchInput"
    zoom:
      level: 2.0
      padding: 60
    annotation: Click the search box

  - id: step-3
    action: type
    selector: "#searchInput"
    text: Playwright
    typeDelay: 100
    zoom:
      level: 2.0
      padding: 60

  - id: step-4
    action: wait
    duration: 1500
    annotation: Search complete!
